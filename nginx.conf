server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy API calls to the backend container.
  # `backend` is the docker-compose service name; override DNS via your
  # deployment networking if you name it differently.
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA history-mode fallback: serve index.html for any unknown path so the
  # in-memory view switcher can take over on the client.
  location / {
    try_files $uri $uri/ /index.html;
  }
}

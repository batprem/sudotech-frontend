server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy API calls to the backend Cloud Run service.
  resolver 8.8.8.8 ipv6=off valid=60s;
  location /api/ {
    proxy_pass https://todo-api-1020107859765.asia-southeast1.run.app;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host              todo-api-1020107859765.asia-southeast1.run.app;
    # The browser includes an Origin header on non-GET same-origin requests.
    # Stripping it stops the backend's CORS middleware from treating this
    # server-to-server hop as a cross-origin browser request.
    proxy_set_header Origin            "";
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA history-mode fallback: serve index.html for any unknown path so the
  # in-memory view switcher can take over on the client.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
